name: Sync Wiki

# Publishes the hand-authored wiki sources under docs/wiki/ to the repository's GitHub wiki
# (the separate <repo>.wiki.git). The in-repo copy is the single source of truth - it is reviewed
# in PRs and versioned with the code; the wiki is a generated mirror, so never edit the wiki
# directly (those edits would be overwritten on the next sync).
on:
  push:
    branches: [main]
    paths:
      - "docs/wiki/**"
      - ".github/workflows/wiki-sync.yml"
  workflow_dispatch:

permissions:
  contents: write

# A single in-flight sync at a time; newer pushes supersede older ones.
concurrency:
  group: wiki-sync
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Publish docs/wiki to the GitHub wiki
        env:
          GIT_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          wiki_url="https://x-access-token:${GIT_TOKEN}@github.com/${GITHUB_REPOSITORY}.wiki.git"

          git clone "$wiki_url" wiki
          # Replace the wiki contents with the in-repo sources (keep the wiki's .git).
          find wiki -mindepth 1 -maxdepth 1 ! -name '.git' -exec rm -rf {} +
          cp -R docs/wiki/. wiki/

          cd wiki
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "Wiki already up to date."
          else
            git commit -m "Sync wiki from ${GITHUB_SHA}"
            git push
          fi
